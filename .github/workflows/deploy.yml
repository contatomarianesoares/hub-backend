name: Deploy hub-backend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 152.67.53.192 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@152.67.53.192 << 'ENDSSH'
          set -e

          APP_DIR="$HOME/hub-backend"
          APP_NAME="hub-backend"

          echo "==> Atualizando código..."
          if [ -d "$APP_DIR/.git" ]; then
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
          else
            git clone https://github.com/contatomarianesoares/hub-backend.git "$APP_DIR"
            cd "$APP_DIR"
          fi

          echo "==> Instalando dependências (sem crash)..."
          # npm ci usa o package-lock.json — mais rápido e seguro que npm install
          # --omit=dev exclui devDependencies, economiza memória
          NODE_OPTIONS="--max-old-space-size=512" npm ci --omit=dev --prefer-offline 2>&1 | tail -5

          echo "==> Verificando PM2..."
          if ! command -v pm2 &>/dev/null; then
            npm install -g pm2 --prefer-offline
            pm2 startup systemd -u ubuntu --hp /home/ubuntu | tail -1 | bash || true
          fi

          echo "==> Deploy com zero downtime..."
          if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
            # App já existe — hot reload sem downtime
            pm2 reload ecosystem.config.cjs --env production --update-env
          else
            # Primeira vez — inicia normalmente
            pm2 start ecosystem.config.cjs --env production
          fi

          pm2 save

          echo "==> Aguardando app subir..."
          sleep 3

          echo "==> Health check..."
          curl -sf http://localhost:3002/health && echo " OK" || echo " WARN: health check falhou (pode estar iniciando)"

          echo "==> Status final:"
          pm2 list
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sf https://hub.jurialvo.com.br/health 2>/dev/null | grep -o '"status":"ok"' || echo "pendente")
          echo "Health check: $STATUS"
          echo "Deploy concluído — https://hub.jurialvo.com.br/health"
